<div class="channel-selection">
  <!-- Overlay -->
  <div class="channel-selection__overlay" (click)="onOverlayClick()"></div>

  <!-- Content -->
  <div class="channel-selection__content" (click)="$event.stopPropagation()">
    <!-- Body -->
    <div class="channel-selection__body">
      @if (filteredChannels().length === 0) {
      <p class="channel-selection__empty">No channels found</p>
      } @else { @for (channel of filteredChannels(); track channel.id) {
      <app-channel-list-item [channel]="channel" (itemClicked)="onChannelClick($event)" />
      } }
    </div>
  </div>
</div>
