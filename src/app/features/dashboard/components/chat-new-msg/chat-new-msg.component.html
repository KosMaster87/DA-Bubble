<div class="chat-new-msg">
  <div class="chat-new-msg__header">
    <h1 class="chat-new-msg__title">New message</h1>
  </div>

  <div class="chat-new-msg__search">
    <div class="chat-new-msg__search-wrapper">
      <input
        type="text"
        class="chat-new-msg__search-input"
        placeholder="#channel, @user, $message"
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event); onSearch()"
      />

      <!-- User Selection Popup (@ prefix) -->
      @if (showUserSelection()) {
        <app-user-selection
          [users]="userResults()"
          [searchValue]="searchQuery().substring(1)"
          (userSelected)="onUserSelected($event)"
          (closed)="onDropdownClose()"
        />
      }

      <!-- Channel Selection Popup (# prefix) -->
      @if (showChannelSelection()) {
        <app-channel-selection
          [channels]="channelResults()"
          [searchValue]="searchQuery().substring(1)"
          (channelSelected)="onChannelSelected($event)"
          (closed)="onDropdownClose()"
        />
      }

      <!-- Message Selection Popup ($ prefix) -->
      @if (showMessageSelection()) {
        <app-message-selection
          [messages]="messageResults()"
          (messageSelected)="onMessageResultSelected($event)"
          (closed)="onDropdownClose()"
        />
      }
    </div>
  </div>

  <div class="chat-new-msg__content">
    <div class="chat-new-msg__empty">
      <p>Search for users or channels to start a conversation</p>
    </div>
  </div>

  <div class="chat-new-msg__footer">
    <app-message-box [users]="allUsers()" (messageSent)="onMessageSent($event)" />
  </div>
</div>
