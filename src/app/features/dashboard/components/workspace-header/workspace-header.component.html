<header class="workspace-header">
  <div class="workspace-header__content">
    <!-- Logo (normal view or mobile sidebar) -->
    @if (!isMobileView() || !showBackToWorkspace()) {
    <div class="workspace-header__logo">
      <app-dabubble-logo />
    </div>
    }

    <!-- Back to Workspace (mobile content/thread view) -->
    @if (isMobileView() && showBackToWorkspace()) {
    <div class="workspace-header__back">
      <app-back-to-workspace (backClicked)="backToWorkspaceRequested.emit()" />
    </div>
    }

    <!-- Search Bar -->
    <div class="workspace-header__search">
      <input
        type="text"
        class="workspace-header__search-input"
        placeholder="Search DABubble..."
        (input)="onSearch($event)"
      />
      <img src="/img/icon/search-default.svg" alt="Search" class="workspace-header__search-icon" />
    </div>

    <!-- Profile Section -->
    <div class="workspace-header__profile-wrapper">
      <button
        class="workspace-header__profile"
        (click)="toggleOptions()"
        [class.workspace-header__profile--active]="isOptionsOpen()"
      >
        <span class="workspace-header__profile-content">
          <span class="workspace-header__profile-name">
            {{ currentUser()?.displayName || 'User' }}
          </span>

          <div class="workspace-header__profile-avatar">
            @if (currentUser()?.photoURL) {
            <img
              [src]="currentUser()?.photoURL"
              [alt]="currentUser()?.displayName || 'User'"
              class="workspace-header__avatar-img"
              (error)="onImageError($event)"
            />
            <img
              [src]="
                userPresenceStore.isUserOnline()(currentUser()?.uid || '')
                  ? '/img/icon/profile/status-online.svg'
                  : '/img/icon/profile/status-away.svg'
              "
              alt=""
              class="workspace-header__status-badge"
            />
            } @else {
            <div class="workspace-header__avatar-placeholder">
              {{ (currentUser()?.displayName || 'U').charAt(0).toUpperCase() }}
            </div>
            }
          </div>

          <img
            src="/img/icon/arrow_default.svg"
            alt="Options"
            class="workspace-header__options-icon"
          />
        </span>
      </button>

      <!-- Desktop Menu -->
      @if (!isMobileView()) {
      <app-user-options-menu
        [isVisible]="isOptionsOpen()"
        (profileClicked)="onProfileClick()"
        (mailboxClicked)="onMailboxClick()"
        (logoutClicked)="logout()"
        (closeClicked)="toggleOptions()"
      />
      }

      <!-- Mobile Menu -->
      @if (isMobileView()) {
      <app-user-options-menu-mobile
        [isVisible]="isOptionsOpen()"
        (profileClicked)="onProfileClick()"
        (mailboxClicked)="onMailboxClick()"
        (logoutClicked)="logout()"
        (closeClicked)="isOptionsOpen.set(false)"
      />
      }

      @if (profileUser) {
      <app-profile-view
        [user]="profileUser"
        [isVisible]="isProfileViewOpen()"
        [isOwnProfile]="true"
        [isChannelOwner]="false"
        [isCurrentUserAdmin]="false"
        [isSelectedUserOwner]="false"
        (closeClicked)="onProfileViewClose()"
        (editClicked)="onProfileEdit()"
        (messageClicked)="onProfileMessage()"
      />
      } @if (editProfileUser) {
      <app-profile-edit
        [user]="editProfileUser"
        [isVisible]="isEditProfileOpen()"
        (closeClicked)="onEditProfileClose()"
        (saveClicked)="onProfileSave($event)"
      />
      }
    </div>
  </div>
</header>
