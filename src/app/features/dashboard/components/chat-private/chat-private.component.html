<div class="chat-private">
  <!-- Header -->
  <div class="chat-private__header">
    <app-user-list-item [user]="userListItem()" (itemClicked)="onUserButtonClick()" />

    <!-- Profile View -->
    @if (selectedUserProfile()) {
    <app-profile-view
      [user]="selectedUserProfile()!"
      [isVisible]="isProfileViewOpen()"
      [isOwnProfile]="isOwnProfile()"
      [isDirectMessage]="true"
      (closeClicked)="onProfileViewClose()"
      (editClicked)="onProfileEdit()"
      (messageClicked)="onProfileMessage()"
      (leaveConversationClicked)="onLeaveConversation()"
    />
    }

    <!-- Edit Profile -->
    @if (editProfileUser()) {
    <app-profile-edit
      [user]="editProfileUser()!"
      [isVisible]="isEditProfileOpen()"
      (closeClicked)="onEditProfileClose()"
      (saveClicked)="onEditProfileSave($event)"
    />
    }

    <!-- Channel View -->
    @if (selectedChannelId()) {
      <app-channel-view
        [channelId]="selectedChannelId()!"
        [isVisible]="isChannelViewOpen()"
        (closeClicked)="onChannelViewClose()"
        (joinClicked)="onChannelViewJoin($event)"
        (navigateClicked)="onChannelViewNavigate($event)"
      />
    }
  </div>

  <!-- Messages Area -->
  <div class="chat-private__messages">
    @if (hasMoreMessages()) {
    <button
      class="chat-private__load-more"
      (click)="loadOlderMessages()"
      [disabled]="loadingOlderMessages()"
    >
      {{ loadingOlderMessages() ? 'Loading...' : 'Load older messages' }}
    </button>
    }
    <app-conversation-messages
      [conversationId]="'dm-' + dmInfo().conversationId"
      [messageGroups]="messagesGroupedByDate()"
      (avatarClicked)="onAvatarClick($event)"
      (senderClicked)="onSenderClick($event)"
      (reactionAdded)="onReactionAdded($event)"
      (threadClicked)="onThreadClick($event)"
      (messageEdited)="onMessageEdited($event)"
      (messageDeleted)="onMessageDeleted($event)"
      (mentionClicked)="openProfileView($event)"
      (channelMentionClicked)="onChannelMentionClick($event)"
    />
  </div>

  <!-- Footer with Message Box -->
  <div class="chat-private__footer">
    <app-message-box
      [users]="dmParticipantList()"
      [channels]="channelListItems()"
      [messages]="searchableMessages()"
      (messageSent)="sendMessage($event)"
      (messageSelected)="scrollToMessage($event)"
    />
  </div>
</div>
