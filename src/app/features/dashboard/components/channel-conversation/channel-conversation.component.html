<div class="channel-conversation">
  <!-- Header -->
  <div class="channel-conversation__header">
    <div class="channel-conversation__header-info">
      <h1 class="channel-conversation__title" (click)="onTitleClick()">
        <img
          src="/img/icon/channel-bar/tag-default.svg"
          alt=""
          class="channel-conversation__title-icon"
        />
        {{ channel().name }}
        <img
          src="/img/icon/arrow_default.svg"
          alt=""
          class="channel-conversation__title-arrow"
          [class.channel-conversation__title-arrow--open]="isChannelInfoOpen()"
        />
      </h1>
      <p class="channel-conversation__description">{{ channel().description }}</p>

      <!-- Channel Info -->
      <app-channel-info
        [channel]="channelInfo()"
        [isVisible]="isChannelInfoOpen()"
        (closeClicked)="onChannelInfoClose()"
        (channelUpdated)="onChannelUpdated($event)"
        (leaveChannelClicked)="onLeaveChannel()"
        (createdByClicked)="onCreatedByClick($event)"
      />
    </div>

    <div class="channel-conversation__header-actions">
      <app-members-miniatures
        [members]="members()"
        [totalCount]="totalMemberCount()"
        (memberClicked)="onViewMembers()"
      />
      <app-add-member-button (addMemberClicked)="onAddMember()" />

      <!-- Members Options Menu -->
      <app-members-options-menu
        [isOpen]="isMembersMenuOpen()"
        [members]="members()"
        (closeClicked)="onCloseMembersMenu()"
        (addMemberClicked)="onAddMember()"
        (memberSelected)="onMemberSelected($event)"
      />

      <!-- Profile View -->
      @if (selectedMember()) {
      <app-profile-view
        [user]="selectedMember()!"
        [isVisible]="isProfileViewOpen()"
        [isOwnProfile]="isOwnProfile()"
        [isAdmin]="isCurrentUserAdmin()"
        (closeClicked)="onProfileViewClose()"
        (editClicked)="onProfileEdit()"
        (messageClicked)="onProfileMessage()"
        (removeMemberClicked)="onRemoveMember()"
      />
      }

      <!-- Edit Profile -->
      @if (editProfileUser()) {
      <app-edit-profile
        [user]="editProfileUser()!"
        [isVisible]="isEditProfileOpen()"
        (closeClicked)="onEditProfileClose()"
        (saveClicked)="onEditProfileSave($event)"
      />
      }

      <!-- Add Members -->
      <app-add-members
        [isVisible]="isAddMembersOpen()"
        [channelName]="channel().name"
        [users]="availableUsers()"
        (closeClicked)="onAddMembersClose()"
        (membersAdded)="onMembersAdded($event)"
      />
    </div>
  </div>

  <!-- Messages Area -->
  <div class="channel-conversation__messages">
    <app-conversation-messages
      [messageGroups]="messagesGroupedByDate()"
      (messageClicked)="onMessageClick($event)"
      (avatarClicked)="onAvatarClick($event)"
      (reactionAdded)="onReactionAdded($event)"
      (threadClicked)="onThreadClick($event)"
    />
  </div>

  <!-- Footer with Message Box -->
  <div class="channel-conversation__footer">
    <app-message-box (messageSent)="sendMessage($event)" />
  </div>
</div>
