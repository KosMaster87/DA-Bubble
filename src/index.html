<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>DABubble - Modern Messaging</title>
    <base href="/" />

    <!-- Viewport & PWA Meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="screen-orientation" content="portrait" />
    <meta name="x5-orientation" content="portrait" />
    <meta
      name="description"
      content="DABubble - Moderne Messaging-Plattform für Teams. Schnell, sicher und intuitiv."
    />
    <meta
      name="keywords"
      content="messaging, chat, communication, team collaboration, Angular, modern design"
    />
    <meta name="author" content="DABubble Team" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest-light.webmanifest" id="manifest-link" />

    <!-- Theme Colors (dynamically updated by script below) -->
    <meta name="theme-color" content="#ffffff" id="theme-color-meta" />
    <meta name="msapplication-TileColor" content="#444df2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DABubble" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="theme-light/icon-32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="theme-light/icon-96.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="theme-light/icon-192.png" />

    <!-- Initial Theme Script (prevents FOUC - Flash of Unstyled Content) -->
    <script>
      // Execute immediately before Angular loads
      (function () {
        try {
          const stored = localStorage.getItem('dabubbleTheme') || 'device';
          const systemIsDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const theme = stored === 'device' ? (systemIsDark ? 'dark' : 'light') : stored;

          // Set theme attribute
          document.documentElement.setAttribute('data-theme', theme);

          // Update theme-color meta tag based on theme
          const themeColors = {
            light: '#ffffff',  // --workspace-bg in light theme
            dark: '#404040'    // --workspace-bg in dark theme
          };
          const metaThemeColor = document.getElementById('theme-color-meta');
          if (metaThemeColor) {
            metaThemeColor.setAttribute('content', themeColors[theme]);
          }
        } catch (e) {
          // Fallback to light theme
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>

    <!-- Open Graph Meta -->
    <meta property="og:title" content="DABubble - Modern Messaging" />
    <meta
      property="og:description"
      content="Moderne Messaging-Plattform für Teams. Schnell, sicher und intuitiv."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dabubble.dev2k.org" />
    <meta
      property="og:image"
      content="https://dabubble.dev2k.org/screenshots/preview-desktop.png"
    />

    <!-- Twitter Card Meta -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DABubble - Modern Messaging" />
    <meta
      name="twitter:description"
      content="Moderne Messaging-Plattform für Teams. Schnell, sicher und intuitiv."
    />
    <meta
      name="twitter:image"
      content="https://dabubble.dev2k.org/screenshots/preview-desktop.png"
    />
  </head>
  <body>
    <app-root></app-root>
    <noscript>Bitte aktivieren Sie JavaScript, um diese Anwendung zu nutzen.</noscript>
  </body>
</html>
